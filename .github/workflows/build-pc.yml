name: Pioneer Desktop Factory
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Decode Certificate
        # We add an ID here so we can reference the file path later
        id: write_cert
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: 'cert.p12'
          encodedString: ${{ secrets.P12_BASE64 }}

      - name: Install & Muscle Rebuild
        run: |
          npm install
          npx electron-rebuild -f -w robotjs
        shell: cmd
        env:
          npm_config_msvs_version: 2022
          npm_config_build_from_source: true

      - name: Build & Sign
        run: npm run build
        env:
          # Use the actual path from the decoding step
          CSC_LINK: ${{ steps.write_cert.outputs.filePath }}
          CSC_KEY_PASSWORD: ${{ secrets.P12_PASSWORD }}

      - name: Upload Signed Pioneer
        uses: actions/upload-artifact@v4
        with:
          name: Pioneer-OS-Windows-Signed
          path: dist/*.exe
