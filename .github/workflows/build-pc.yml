name: Pioneer Desktop Factory
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Portable EXE
        run: npm run build

      - name: Upload Pioneer Executable
        uses: actions/upload-artifact@v4
        with:
          name: Pioneer-OS-Windows
          path: dist/*.exe
