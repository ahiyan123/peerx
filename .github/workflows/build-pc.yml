name: Pioneer Desktop Factory
on: [push] # The factory starts every time you save code

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Electron Forge
        run: |
          npm init -y
          npm install --save-dev @electron-forge/cli
          npx electron-forge import
          npm install robotjs # The "Hands" for Windows control

      - name: Build EXE
        run: npm run make

      - name: Upload Pioneer Executable
        uses: actions/upload-artifact@v4
        with:
          name: Pioneer-OS-Windows
          path: out/make/squirrel.windows/x64/*.exe
