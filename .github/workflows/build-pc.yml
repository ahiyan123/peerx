name: Pioneer Desktop Factory
on: [push]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Keeping your version 20

      - name: Decode Certificate
        run: |
          echo "${{ secrets.P12_BASE64 }}" > cert.p12.base64
          certutil -decode cert.p12.base64 cert.p12
        shell: cmd

      - name: Install & Muscle Rebuild
        # We use MSVS_VERSION 2022 to leverage the runner's pre-installed compiler
        run: |
          npm install
          npx electron-rebuild -f -w robotjs
        shell: cmd
        env:
          npm_config_msvs_version: 2022
          npm_config_build_from_source: true

      - name: Build & Sign
        run: npm run build
        env:
          CSC_LINK: ${{ github.workspace }}\cert.p12
          CSC_KEY_PASSWORD: ${{ secrets.P12_PASSWORD }}
          # Ensures the signed build includes the compiled robotjs
          DEBUG: electron-rebuild

      - name: Upload Signed Pioneer
        uses: actions/upload-artifact@v4
        with:
          name: Pioneer-OS-Windows-Signed
          path: dist/*.exe
